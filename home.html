<!DOCTYPE html>
<html lang="kr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Document</title>
    <style>
      * {
        border: 3px dashed black;
      }
      html {
        background-color: sandybrown;
      }
      body {
        height: 100vh;
        background-color: saddlebrown;
      }
      div {
        height: 100px;
        width: 100px;
        background-color: lightblue;
        margin: 8px;
        border: 5px solid black;
        padding: 16px;
      }
      span {
        /*display: block;*/
        background-color: whitesmoke;
      }
      #first {
        background-color: blue;
      }
      #second {
        height: 50px;
        width: 50px;
      }
      #third {
        height: 30px;
        width: 30px;
      }
      #fourth {
        height: 10px;
        width: 10px;
      }
      .btn {
        margin: 2px;
        padding: 2px;
        border: 1px solid;
        border-radius: 10px;
      }
      .teal {
        background-color: teal;
      }
      .tomato {
        background-color: tomato;
      }
      #parent {
        height: 40vh;
        width: 50vw;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: olive;
      }
      .children {
        height: 300px;
        width: 300px;
        background-color: darkolivegreen;
      }
    </style>
  </head>
  <body>
    <div id="parent">
      <div class="children"></div>
      <div class="children"></div>
      <div class="children"></div>
      <div class="children"></div>
    </div>

    <div id="first">
      <div id="second">
        <div id="third">
          <div id="fourth"></div>
        </div>
      </div>
    </div>

    <span>bla</span>
    <span>bla</span>
    <span>bla</span>
    <a href="#">link</a>
    <img src="cow.jpg" width="100" alt="" />

    <span class="btn teal">Hello</span>
    <span class="btn tomato">Hello</span>
    <span class="btn teal">Hello</span>
    <span class="btn tomato">Hello</span>
    <span class="btn teal">Hello</span>
    <span class="btn tomato">Hello</span>
    <span class="btn teal">Hello</span>
  </body>
</html>
